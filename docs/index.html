<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smiggles OS - x86 Emulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000;
            font-family: 'Courier New', 'Monaco', 'Lucida Console', monospace;
            overflow: hidden;
        }
        
        #screen {
            width: 100vw;
            height: 100vh;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        canvas {
            display: block;
            background-color: #000;
            font-family: 'Courier New', monospace;
            letter-spacing: 0;
            line-height: 1;
        }
    </style>
</head>
<body>
    <canvas id="screen"></canvas>
    
    <script src="https://cdn.jsdelivr.net/npm/v86@latest/build/v86.js" defer></script>
    <script>
        var emulator = new V86({
            wasm_path: "https://cdn.jsdelivr.net/npm/v86@latest/build/v86.wasm",
            bios: {
                url: "https://cdn.jsdelivr.net/npm/v86@latest/build/seabios.bin",
            },
            vga_bios: {
                url: "https://cdn.jsdelivr.net/npm/v86@latest/build/vgabios.bin",
            },
            cdrom: {
                url: "smiggles.iso",
            },
            hda: {
                url: "hdd.img",
            },
            autostart: true,
            memory_size: 64 * 1024 * 1024,
            display_scale: 1,
        });

        emulator.add_listener("emulator-ready", function() {
            console.log("Smiggles OS is ready!");
        });
    </script>
</body>
</html>
