<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Smiggles Demo</title>
  <style>
    html, body, #screen {
      width: 100%;
      height: 100%;
      margin: 0;
      background: black;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="screen"></div>

  <script src="build/libv86.js"></script>
  <script>
    const emu = new V86({
      screen_container: document.getElementById("screen"),
      wasm_path: "build/v86.wasm",
      bios: { url: "bios/seabios.bin" },
      vga_bios: { url: "bios/vgabios.bin" },
      cdrom: { url: "smiggles.iso" },
      hda: { url: "hdd.img" },
      autostart: true
    });  
</script>
</body>
</html>
